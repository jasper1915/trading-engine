spring.application.name=engine
spring.datasource.url=jdbc:postgresql://localhost:5432/trading_engine
spring.datasource.username=postgres
spring.datasource.password=Raushan19@

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.error.include-message=always
server.error.include-binding-errors=always
spring.jpa.open-in-view=false

# ===============================
# 📧 AWS SES CONFIGURATION
# ===============================
aws.access-key=${AWS_ACCESS_KEY}
aws.secret-key=${AWS_SECRET_KEY}
aws.region=ap-south-1
aws.sender-email=${AWS_SENDER_EMAIL}

# ===============================
# 📱 MSG91 CONFIGURATION (SMS)
# ===============================
msg91.auth-key=${MSG91_AUTH_KEY}
msg91.template-id=${MSG91_TEMPLATE_ID}

# 📱 Twilio Settings (SMS Fallback)
twilio.account-sid=${TWILIO_SID}
twilio.auth-token=${TWILIO_TOKEN}
twilio.phone-number=${TWILIO_PHONE}

# ===============================
# 🤖 GEMINI AI CONFIGURATION
# ===============================
# Get your free key at https://aistudio.google.com/
gemini.api-key=${GEMINI_API_KEY}
gemini.model=gemini-flash-latest