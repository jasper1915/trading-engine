spring.application.name=engine
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres
spring.datasource.username=postgres.pnjraiocynkhwshyroln
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=${PORT:8080}

server.error.include-message=always
server.error.include-binding-errors=always
spring.jpa.open-in-view=false

# ===============================
# 📧 AWS SES CONFIGURATION
# ===============================
aws.access-key=${AWS_ACCESS_KEY:}
aws.secret-key=${AWS_SECRET_KEY:}
aws.region=ap-south-1
aws.sender-email=${AWS_SENDER_EMAIL:}

